<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Traffic Violation Detection</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#f4f7fb; }
.sidebar { width:250px; height:100vh; position:fixed; background:#0d3b66; color:white; padding:20px; }
.sidebar a { display:block; padding:12px; margin:10px 0; color:white; text-decoration:none; border-radius:8px; cursor:pointer; }
.sidebar a:hover { background:#1e5f9e; }
.main { margin-left:270px; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); margin-bottom:20px; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
.full { grid-column:span 2; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid #ddd; }
.violation { background:#ffdddd; }
.video-feed { width:100%; height:350px; object-fit:cover; border-radius:10px; }
canvas { max-width:400px !important; max-height:300px !important; margin:auto; }
#challanList { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:15px; }
#challanList img { width:100%; height:180px; object-fit:cover; }
</style>
</head>

<body>

<div class="sidebar">
    <h2>🚦 TVDS</h2>
    <a onclick="showSection('dashboard')">📊 Dashboard</a>
    <a onclick="showSection('analytics')">📈 Analytics</a>
    <a onclick="showSection('camera')">📷 Camera</a>
    <a onclick="showSection('challan')">🚨 E-Challan</a>
</div>

<div class="main">

<div id="dashboard" class="section">
    <div class="card">
        <h2>Traffic Violation Detection System</h2>
        <p>AI Powered Monitoring Dashboard</p>
    </div>
</div>

<div id="analytics" class="section" style="display:none;">
    <div class="grid">
        <div class="card">
            <h3>Vehicle Type Violations</h3>
            <canvas id="vehicleChart"></canvas>
        </div>

        <div class="card">
            <h3>Violations by Time</h3>
            <canvas id="dateChart"></canvas>
        </div>

        <div class="card full">
            <h3>State-wise Violations</h3>
            <canvas id="stateChart"></canvas>
        </div>
    </div>
</div>

<div id="camera" class="section" style="display:none;">
    <div class="grid">

        <div class="card">
            <h3>Upload</h3>
            <form id="uploadForm">
                <input type="file" name="file" required>
                <button type="submit">Upload</button>
            </form>
            <div id="imageResult"></div>
        </div>

        <div class="card">
            <h3>Live Feed</h3>
            <img class="video-feed" id="videoFeed">
        </div>

        <div class="card full">
            <h3>Live Violations</h3>
            <table id="liveTable">
                <tr>
                    <th>Vehicle</th>
                    <th>Helmet</th>
                    <th>Triple</th>
                    <th>Plate</th>
                </tr>
            </table>
        </div>

    </div>
</div>

<div id="challan" class="section" style="display:none;">
    <div class="card">
        <h2>Violation Records</h2>
        <div id="challanList"></div>
    </div>
</div>

</div>

<script>

/* SECTION SWITCH */
function showSection(id){
    document.querySelectorAll('.section').forEach(sec=>sec.style.display='none');
    document.getElementById(id).style.display='block';

    if(id === "analytics") loadAnalytics();
    if(id === "challan") loadChallan();
}

showSection("dashboard");

/* FAST VIDEO LOAD */
document.getElementById("uploadForm").onsubmit = async function(e){
    e.preventDefault();

    let formData = new FormData(this);
    let res = await fetch("/upload", { method: "POST", body: formData });
    let data = await res.json();

    showSection("camera");

    if(data.type === "image"){
        document.getElementById("imageResult").innerHTML =
            `<img src="/static/uploads/${data.image}" width="300">`;
    }

    if(data.type === "video"){
        let video = document.getElementById("videoFeed");
        video.src = "";
        setTimeout(()=>{
            video.src = "/video_feed?" + Date.now();
        }, 300);
    }
};

/* LIVE TABLE */
const evtSource = new EventSource("/violations_stream");
const table = document.getElementById("liveTable");

evtSource.onmessage = function(e){
    const data = JSON.parse(e.data);

    table.innerHTML = `
    <tr>
        <th>Vehicle</th>
        <th>Helmet</th>
        <th>Triple</th>
        <th>Plate</th>
    </tr>`;

    data.forEach(d=>{
        let row = table.insertRow();

        if(d.helmet === "No" || d.triple_riding === "Yes"){
            row.classList.add("violation");
        }

        row.insertCell(0).innerText = d.vehicle;
        row.insertCell(1).innerText = d.helmet;
        row.insertCell(2).innerText = d.triple_riding;
        row.insertCell(3).innerText = d.plate;
    });
};

/* CHALLAN */
async function loadChallan(){
    let res = await fetch("/api/violations");
    let data = await res.json();

    let html = "";
    data.forEach(v=>{
        html += `
        <div class="card">
            <img src="/${v.image}">
            <p><b>${v.vehicle}</b></p>
            <p>${v.plate}</p>
            <p>${v.reason}</p>
            <p>${v.time}</p>
        </div>`;
    });

    document.getElementById("challanList").innerHTML = html;
}

/* FORMAT HOUR */
function formatHour(h){
    let suffix = h >= 12 ? "PM" : "AM";
    let hour = h % 12;
    if(hour === 0) hour = 12;
    return `${hour} ${suffix}`;
}

/* CHART INSTANCES */
let vehicleChartInstance, dateChartInstance;

/* ANALYTICS */
async function loadAnalytics(){

    let res = await fetch("/api/violations");
    let data = await res.json();

    let vehicleCount = {};
    let timeSlots = {};

    const allowedVehicles = ["car", "motorcycle", "bus", "truck"];

    // FIXED ORDER (NO SORT BUG)
    for(let i=0;i<24;i++){
        timeSlots[formatHour(i)] = 0;
    }

    data.forEach(v => {

        if (allowedVehicles.includes(v.vehicle)) {
            vehicleCount[v.vehicle] = (vehicleCount[v.vehicle] || 0) + 1;
        }

        let timePart = v.time.split(",")[1].trim();
        let hour = parseInt(timePart.split(":")[0]);
        let isPM = timePart.includes("PM");

        if (isPM && hour !== 12) hour += 12;
        if (!isPM && hour === 12) hour = 0;

        let label = formatHour(hour);
        timeSlots[label]++;
    });

    // DESTROY OLD CHARTS
    if(vehicleChartInstance) vehicleChartInstance.destroy();
    if(dateChartInstance) dateChartInstance.destroy();

    vehicleChartInstance = new Chart(vehicleChart, {
        type: 'pie',
        data: {
            labels: Object.keys(vehicleCount),
            datasets: [{ data: Object.values(vehicleCount) }]
        }
    });

    dateChartInstance = new Chart(dateChart, {
        type: 'bar',
        data: {
            labels: Object.keys(timeSlots),
            datasets: [{
                label: "Violations",
                data: Object.values(timeSlots)
            }]
        }
    });

    new Chart(stateChart, {
        type: 'doughnut',
        data: {
            labels:["HR","DL","UK","UP","PB"],
            datasets:[{data:[12,19,8,15,10]}]
        }
    });
}

/* AUTO REFRESH */
setInterval(()=>{
    if(document.getElementById("analytics").style.display === "block"){
        loadAnalytics();
    }
}, 5000);

</script>

</body>
</html>
