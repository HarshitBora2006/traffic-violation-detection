<!DOCTYPE html>
<html>
<head>
    <title>Traffic Violation Video Stream</title>
    <style>
        body { font-family: Arial; text-align:center; padding:20px; }
        img { margin-bottom: 20px; border:2px solid #333; }
        table { margin:auto; border-collapse: collapse; width: 80%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align:center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Traffic Violation Video Stream</h1>
    <img src="{{ url_for('video_feed') }}" width="800">

    <h2>Live Violation Details</h2>
    <table id="violation_table">
        <tr>
            <th>Vehicle</th>
            <th>Helmet</th>
            <th>Triple Riding</th>
            <th>Number Plate</th>
        </tr>
    </table>

    <script>
        const table = document.getElementById("violation_table");
        const evtSource = new EventSource("/violations_stream");

        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);

            // Clear table
            table.innerHTML = `<tr>
                <th>Vehicle</th>
                <th>Helmet</th>
                <th>Triple Riding</th>
                <th>Number Plate</th>
            </tr>`;

            // Add current frame's violations
            data.forEach(item => {
                const row = table.insertRow();
                row.insertCell(0).innerText = item.vehicle;
                row.insertCell(1).innerText = item.helmet;
                row.insertCell(2).innerText = item.triple_riding;
                row.insertCell(3).innerText = item.plate;
            });
        };
    </script>
</body>
</html>
