<!DOCTYPE html>
<html>
<head>
<title>Violations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins;
    background:#0f172a;
    color:white;
}

/* NAV */
nav {
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#020617;
}

nav a {
    color:white;
    text-decoration:none;
    margin-left:20px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:#020617;
    border-radius:10px;
    overflow:hidden;
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
}

.info {
    padding:10px;
}

.reason {
    color:red;
}
</style>
</head>

<body>

<nav>
    <div>🚨 Violations</div>
    <div>
        <a href="/">Dashboard</a>
        <a href="/violations">Violations</a>
    </div>
</nav>

<div class="grid" id="grid"></div>

<script>
async function load(){
    const res = await fetch("/api/violations");
    const data = await res.json();

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.slice(0,50).forEach(v=>{
        grid.innerHTML += `
        <div class="card">
            <img src="${v.image}">
            <div class="info">
                <div>${v.vehicle}</div>
                <div>${v.plate}</div>
                <div class="reason">${v.reason}</div>
                <small>${v.time}</small>
            </div>
        </div>`;
    });
}

setInterval(load,2000);
load();
</script>

</body>
</html>
